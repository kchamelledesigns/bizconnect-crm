    <!-- Add Client -->
    <section class="card">
      <h2>Add New Client</h2>
      <form id="clientForm" autocomplete="off">
        <!-- Hidden fields to prevent autofill -->
        <input type="text" name="fakeusernameremembered" style="display:none">
        <input type="password" name="fakepasswordremembered" style="display:none">

        <input type="text" id="name" name="name" placeholder="Client Name" required autocomplete="new-password" />
        <input type="email" id="email" name="email" placeholder="Email" required autocomplete="new-password" />
        <select id="status" name="status" autocomplete="off">
          <option value="Lead">Lead</option>
          <option value="In Progress">In Progress</option>
          <option value="Closed">Closed</option>
        </select>
        <button type="submit">Add Client</button>
      </form>
    </section>

    <!-- Client List -->
    <section class="card">
      <h2>Client List</h2>
      <input type="text" id="searchInput" placeholder="Search clients..." autocomplete="off"/>
      <ul id="clientList"></ul>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
