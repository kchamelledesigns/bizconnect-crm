<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BizConnect CRM</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="header">
    <h1>BizConnect CRM</h1>
    <p>Manage your clients, deals, and growth.</p>
  </header>

  <main class="container">

    <!-- Dashboard -->
    <section class="card stats">
      <div>
        <h3 id="totalClients">0</h3>
        <p>Total Clients</p>
      </div>
      <div>
        <h3 id="totalLeads">0</h3>
        <p>Leads</p>
      </div>
      <div>
        <h3 id="totalClosed">0</h3>
        <p>Closed</p>
      </div>
    </section>

    <!-- Add Client -->
    <section class="card">
      <h2>Add New Client</h2>
      <form id="clientForm" autocomplete="off">
        <!-- Hidden fields to prevent autofill -->
        <input type="text" name="fakeusernameremembered" style="display:none">
        <input type="password" name="fakepasswordremembered" style="display:none">

        <input type="text" id="name" name="name" placeholder="Client Name" required autocomplete="new-password" />
        <input type="email" id="email" name="email" placeholder="Email" required autocomplete="new-password" />
        <select id="status" name="status" autocomplete="off">
          <option value="Lead">Lead</option>
          <option value="In Progress">In Progress</option>
          <option value="Closed">Closed</option>
        </select>
        <button type="submit">Add Client</button>
      </form>
    </section>

    <!-- Client List -->
    <section class="card">
      <h2>Client List</h2>
      <input type="text" id="searchInput" placeholder="Search clients..." autocomplete="off"/>
      <ul id="clientList"></ul>
    </section>

  </main>

  <script src="script.js"></script>
</html>
